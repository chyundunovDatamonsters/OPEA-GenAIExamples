services:
  vdms-vector-db:
    image: intellabs/vdms:v2.10.0
    container_name: vdms-vector-db
    ports:
      - "8001:55555"
  dataprep:
    image: ${REGISTRY:-opea}/dataprep-multimodal-vdms:${TAG:-latest}
    container_name: dataprep-vdms-server
    depends_on:
      - vdms-vector-db
    ports:
      - "6007:6007"
    environment:
      no_proxy: ${no_proxy}
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
      VDMS_HOST: ${VDMS_HOST}
      VDMS_PORT: ${VDMS_PORT}
      INDEX_NAME: ${INDEX_NAME}
      PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: "python"
    entrypoint: sh -c 'sleep 15 && python ingest_videos.py'
    volumes:
      - ./app/clip:/home/user/.cache/clip
      - ./app/hub:/home/user/.cache/huggingface/hub
  embedding:
    image: ${REGISTRY:-opea}/embedding-multimodal-clip:${TAG:-latest}
    container_name: embedding-multimodal-server
    ports:
      - "6000:6000"
    ipc: host
    environment:
      no_proxy: ${no_proxy}
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
    volumes:
      - ./app/hub:/home/user/.cache/huggingface/hub
    restart: unless-stopped
  retriever:
    image: ${REGISTRY:-opea}/retriever-vdms:${TAG:-latest}
    container_name: retriever-vdms-server
    depends_on:
      - vdms-vector-db
    ports:
      - "7000:7000"
    ipc: host
    environment:
      no_proxy: ${no_proxy}
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
      INDEX_NAME: ${INDEX_NAME}
      VDMS_HOST: ${VDMS_HOST}
      VDMS_PORT: ${VDMS_PORT}
      USECLIP: ${USECLIP}
    entrypoint: sh -c 'sleep 30 && python retriever_vdms.py'
    restart: unless-stopped
    volumes:
      - ./app/hub:/home/user/.cache/huggingface/hub
  reranking:
    image: ${REGISTRY:-opea}/reranking-videoqna:${TAG:-latest}
    container_name: reranking-videoqna-server
    ports:
      - "8000:8000"
    ipc: host
    environment:
      no_proxy: ${no_proxy}
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
      CHUNK_DURATION: ${CHUNK_DURATION}
      FILE_SERVER_ENDPOINT: ${DATAPREP_GET_FILE_ENDPOINT}
      DATAPREP_GET_VIDEO_LIST_ENDPOINT: ${DATAPREP_GET_VIDEO_LIST_ENDPOINT}
    restart: unless-stopped

  tgi-rocm:
    image: ghcr.io/huggingface/text-generation-inference:2.4.1-rocm
    container_name: tgi-llava-rocm-server
    ports:
      - "9009:80"
    environment:
      no_proxy: ${no_proxy}
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
      TGI_LLM_ENDPOINT: "http://${HOST_IP}:${VIDEOQNA_TGI_SERVICE_PORT}"
      HUGGINGFACEHUB_API_TOKEN: ${VIDEOQNA_HUGGINGFACEHUB_API_TOKEN}
      HUGGING_FACE_HUB_TOKEN: ${VIDEOQNA_HUGGINGFACEHUB_API_TOKEN}
    volumes:
      - "/var/opea/videoqna-service/data:/data"
    shm_size: 64g
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    cap_add:
      - SYS_PTRACE
    group_add:
      - video
    security_opt:
      - seccomp:unconfined
    ipc: host
    command: --model-id ${VIDEOQNA_LVM_MODEL_ID} --max-input-tokens 3048 --max-total-tokens 4096
    restart: unless-stopped
  lvm:
    image: ${REGISTRY:-opea}/lvm-video-llama:${TAG:-latest}
    container_name: lvm-video-llama
    ports:
      - "9000:9000"
    ipc: host
    environment:
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
      no_proxy: ${no_proxy}
      LVM_ENDPOINT: ${LVM_ENDPOINT}
    restart: unless-stopped
    depends_on:
      - tgi-rocm
  videoqna-backend-server:
    image: ${REGISTRY:-opea}/videoqna:${TAG:-latest}
    container_name: videoqna-backend-server
    depends_on:
      - vdms-vector-db
      - dataprep
      - embedding
      - retriever
      - reranking
      - tgi-rocm
      - lvm
#      - videoqna-vllm-service
    ports:
      - "8888:8888"
    entrypoint: sh -c 'sleep 45 && python videoqna.py'
    environment:
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
      no_proxy: ${no_proxy}
      MEGA_SERVICE_HOST_IP: ${MEGA_SERVICE_HOST_IP}
      EMBEDDING_SERVICE_HOST_IP: ${EMBEDDING_SERVICE_HOST_IP}
      RETRIEVER_SERVICE_HOST_IP: ${RETRIEVER_SERVICE_HOST_IP}
      RERANK_SERVICE_HOST_IP: ${RERANK_SERVICE_HOST_IP}
      LVM_SERVICE_HOST_IP: ${LVM_SERVICE_HOST_IP}
    ipc: host
    restart: always
  videoqna-ui-server:
    image: ${REGISTRY:-opea}/videoqna-ui:${TAG:-latest}
    container_name: videoqna-ui-server
    depends_on:
      - videoqna-backend-server
    ports:
      - "5173:5173"
    environment:
      https_proxy: ${https_proxy}
      http_proxy: ${http_proxy}
      no_proxy: ${no_proxy}
      BACKEND_SERVICE_ENDPOINT: ${BACKEND_SERVICE_ENDPOINT}
      BACKEND_HEALTH_CHECK_ENDPOINT: ${BACKEND_HEALTH_CHECK_ENDPOINT}
    ipc: host
    restart: always
networks:
  default:
    driver: bridge
